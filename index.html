<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificados</title>
    <!-- Cargamos la librería oficial de Supabase -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        .valido { color: #2e7d32; background-color: #e8f5e9; padding: 15px; border-radius: 8px; }
        .invalido { color: #c62828; background-color: #ffebee; padding: 15px; border-radius: 8px; }
        .datos { text-align: left; margin-top: 15px; background: #fafafa; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="resultado">
            <h2>Cargando verificador...</h2>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZWFxd2JvaG5xcmhvdWdwZ3lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY5NzMsImV4cCI6MjA5OTczMjk3M30._kJnOjn2Q29EJgtrfdeJATwoHBmAFrfIbY-2c91a-uk";

        async function comprobar() {
            const contenedor = document.getElementById('resultado');
            const urlParams = new URLSearchParams(window.location.search);
            const folioBuscado = urlParams.get('folio');

            if (!folioBuscado) {
                contenedor.innerHTML = "<h2>⚠️ Falta el folio en el enlace</h2>";
                return;
            }

            try {
                const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await client.from('DIPLOMAS').select('*').eq('FOLIO', folioBuscado).single();

                if (error) {
                    contenedor.innerHTML = `<div class="invalido"><h2>❌ Error de conexión</h2><p>${error.message}</p></div>`;
                    return;
                }

                if (!data) {
                    contenedor.innerHTML = `<div class="invalido"><h2>❌ No encontrado</h2><p>El folio no existe.</p></div>`;
                } else {
                    contenedor.innerHTML = `
                        <div class="valido"><h2>✅ Certificado Verificado</h2></div>
                        <div class="datos">
                            <p><strong>Folio:</strong> ${data.FOLIO}</p>
                            <p><strong>Alumno:</strong> ${data.NOMBRE}</p>
                            <p><strong>Programa:</strong> ${data.DIPLOMADO}</p>
                            <p><strong>Estatus:</strong> ${data.ESTADO}</p>
                        </div>`;
                }
            } catch (err) {
                contenedor.innerHTML = `<div class="invalido"><h2>⚠️ Error de código</h2><p>${err.message}</p></div>`;
            }
        }

        comprobar();
    </script>
</body>
</html>
