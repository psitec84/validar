<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Documentos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; box-sizing: border-box; }
        .logo { max-width: 150px; height: auto; margin-bottom: 20px; }
        .valido { color: #2e7d32; background-color: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; }
        .invalido { color: #c62828; background-color: #ffebee; padding: 15px; border-radius: 8px; border: 1px solid #ffcdd2; }
        .datos { text-align: left; margin-top: 15px; background: #fafafa; padding: 15px; border-radius: 6px; font-size: 14px; }
        .datos p { margin: 8px 0; border-bottom: 1px dashed #eee; padding-bottom: 6px; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Logotipo Institucional -->
        <img src="https://githubusercontent.com" class="logo" alt="Logo Psicología Tecnológica" onerror="this.style.display='none';">
        
        <div id="resultado">
            <h2>Verificando documento...</h2>
            <p>Por favor, espere un momento.</p>
        </div>
    </div>

    <script>
        const PROJECT_ID = "pheaqwbohnqrhougpgyd";
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoZWFxd2JvaG5xcmhvdWdwZ3lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY5NzMsImV4cCI6MjA5OTczMjk3M30._kJnOjn2Q29EJgtrfdeJATwoHBmAFrfIbY-2c91a-uk";
        
        async function consultarFormulario() {
            const contenedor = document.getElementById('resultado');
            const urlParams = new URLSearchParams(window.location.search);
            const folioBuscado = urlParams.get('folio');

            if (!folioBuscado) {
                contenedor.innerHTML = "<h2>⚠️ Error de acceso</h2><p>Falta el código de folio en el enlace.</p>";
                return;
            }

            // Probamos primero buscando en mayúscula y si falla en minúscula
            let endpoint = `https://${PROJECT_ID}.supabase.co/rest/v1/DIPLOMAS?FOLIO=eq.${encodeURIComponent(folioBuscado)}`;

            try {
                let respuesta = await fetch(endpoint, {
                    method: 'GET',
                    headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
                });

                let datosLista = await respuesta.json();

                // Si no encuentra por FOLIO (mayúsculas), intenta buscar por folio (minúsculas)
                if (datosLista.length === 0 || datosLista.code === "PGRST204") {
                    endpoint = `https://${PROJECT_ID}.supabase.co/rest/v1/DIPLOMAS?folio=eq.${encodeURIComponent(folioBuscado)}`;
                    respuesta = await fetch(endpoint, {
                        method: 'GET',
                        headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
                    });
                    datosLista = await respuesta.json();
                }

                if (datosLista.length === 0) {
                    contenedor.innerHTML = `
                        <div class="invalido">
                            <h2>❌ Documento NO Válido</h2>
                            <p>El folio <strong>${folioBuscado}</strong> no existe en nuestros registros oficiales.</p>
                        </div>
                    `;
                } else {
                    const data = datosLista[0];
                    
                    // Extraer los valores soportando tanto MAYÚSCULAS como minúsculas
                    const f_folio = data.FOLIO || data.folio || 'No registrado';
                    const f_nombre = data.NOMBRE || data.nombre || 'No registrado';
                    const f_diplomado = data.DIPLOMADO || data.diplomado || 'No registrado';
                    const f_duracion = data.DURACION || data.duracion || '0';
                    const f_inicio = data.INICIO || data.inicio || 'No registrado';
                    const f_fin = data.FIN || data.fin || 'No registrado';
                    
                    let estatusOriginal = data.ESTADO || data.estado || 'No registrado';
                    let estatusTexto = estatusOriginal;
                    if (estatusOriginal.toUpperCase() === "DOCUMENTO VALIDO" || estatusOriginal.toUpperCase() === "ACTIVO") {
                        estatusTexto = "DOCUMENTO CON VALOR CURRICULAR";
                    }

                    contenedor.innerHTML = `
                        <div class="valido">
                            <h2>✅ Documento Verificado</h2>
                            <p>Este documento es auténtico y oficial.</p>
                        </div>
                        <div class="datos">
                            <p><strong>Folio:</strong> ${f_folio}</p>
                            <p><strong>Alumno:</strong> ${f_nombre}</p>
                            <p><strong>Programa:</strong> ${f_diplomado}</p>
                            <p><strong>Duración:</strong> ${f_duracion} HRS</p>
                            <p><strong>Fecha de Inicio:</strong> ${f_inicio}</p>
                            <p><strong>Fecha de Fin:</strong> ${f_fin}</p>
                            <p><strong>Estatus:</strong> ${estatusTexto}</p>
                        </div>
                    `;
                }
            } catch (err) {
                contenedor.innerHTML = `<div class="invalido"><h2>⚠️ Error de red</h2><p>No se pudo conectar a la base de datos.</p></div>`;
            }
        }

        consultarFormulario();
    </script>
</body>
</html>
